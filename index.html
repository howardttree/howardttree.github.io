<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Howard Zhang modeling portfolio with measurements and portfolio images."
    />
    <title>Howard Zhang</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Site header">
      <a class="wordmark" href="#top" aria-label="Howard Zhang home">
        Howard Zhang
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#portfolio">Portfolio</a>
        <a href="#measurements">Measurements</a>
        <a href="https://www.instagram.com/howardttree/" target="_blank" rel="noreferrer">
          Instagram
        </a>
      </nav>
    </header>

    <main id="top">
      <section class="intro" aria-labelledby="page-title">
        <div class="intro-copy">
          <p class="kicker">Portfolio</p>
          <h1 id="page-title">
            Howard
            <span>Zhang</span>
          </h1>
        </div>

        <dl id="measurements" class="measurements" aria-label="Measurements">
          <div>
            <dt>Height</dt>
            <dd>5'10.5"</dd>
          </div>
          <div>
            <dt>Chest</dt>
            <dd>35.5 in</dd>
          </div>
          <div>
            <dt>Waist</dt>
            <dd>30.5 in</dd>
          </div>
          <div>
            <dt>Hip</dt>
            <dd>36.5 in</dd>
          </div>
          <div>
            <dt>Shoe</dt>
            <dd>10.5</dd>
          </div>
          <div>
            <dt>Hair</dt>
            <dd>Black</dd>
          </div>
          <div>
            <dt>Eyes</dt>
            <dd>Brown</dd>
          </div>
          <div>
            <dt>Pronouns</dt>
            <dd>He/Him/His</dd>
          </div>
        </dl>
      </section>

      <section id="portfolio" class="portfolio" aria-label="Portfolio images">
        <figure class="hero-image">
          <img src="assets/head-shot.png" alt="Howard Zhang headshot" />
        </figure>

        <div class="image-grid">
          <figure class="span-tall">
            <img src="assets/full-body.png" alt="Howard Zhang full body portfolio image" />
          </figure>
          <figure>
            <img src="assets/three-quarter.png" alt="Howard Zhang three-quarter portfolio image" />
          </figure>
          <figure>
            <img src="assets/left-profile.png" alt="Howard Zhang left profile portfolio image" />
          </figure>
          <figure>
            <img src="assets/half-body.png" alt="Howard Zhang half body portfolio image" />
          </figure>
          <figure>
            <img src="assets/right-profile.png" alt="Howard Zhang right profile portfolio image" />
          </figure>
        </div>
      </section>
    </main>

    <footer class="footer">
      <a href="https://www.instagram.com/howardttree/" target="_blank" rel="noreferrer">
        @howardttree
      </a>
    </footer>
  </body>
</html>
